services:
  postgres:
    image: postgres:16-alpine
    container_name: lumary-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P0stgr3s_2026
      POSTGRES_DB: lumi_crm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumary-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:P0stgr3s_2026@postgres:5432/lumi_crm?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-lumary-dash-secret-32char-min-for-nextauth!!}
      NEXTAUTH_SECRET: ${AUTH_SECRET:-lumary-dash-secret-32char-min-for-nextauth!!}
      NEXTAUTH_URL: http://localhost:3000
      MCP_API_KEY: ${MCP_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
